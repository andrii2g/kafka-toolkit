services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka-toolkit-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "bash", "-lc", "cat < /dev/null > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  topic-init:
    image: apache/kafka:3.9.0
    container_name: kafka-toolkit-topic-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -euo pipefail
        for i in $$(seq 1 60); do
          if kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1; then
            break
          fi
          if [ "$$i" -eq 60 ]; then
            echo "Kafka did not become ready for topic creation" >&2
            exit 1
          fi
          sleep 2
        done
        kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic orders --partitions 6 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic payments --partitions 3 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic notifications --partitions 4 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic healthcheck.kafka --partitions 1 --replication-factor 1

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-toolkit-kafka-ui
    depends_on:
      topic-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "false"

  sample-producer:
    build: ./samples/sample-producer
    container_name: kafka-toolkit-sample-producer
    depends_on:
      topic-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PRODUCER_TOPICS: orders,payments,notifications
      PRODUCER_INTERVAL_MS: 250
      PRODUCER_BATCH_SIZE: 5

  sample-consumer-orders-slow:
    build: ./samples/sample-consumer
    container_name: kafka-toolkit-sample-consumer-orders-slow
    depends_on:
      topic-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CONSUMER_GROUP: orders-worker
      CONSUMER_TOPIC: orders
      CONSUMER_SLEEP_MS: 1500
      CONSUMER_AUTO_OFFSET_RESET: earliest

  sample-consumer-payments-fast:
    build: ./samples/sample-consumer
    container_name: kafka-toolkit-sample-consumer-payments-fast
    depends_on:
      topic-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CONSUMER_GROUP: payments-worker
      CONSUMER_TOPIC: payments
      CONSUMER_SLEEP_MS: 50
      CONSUMER_AUTO_OFFSET_RESET: earliest
